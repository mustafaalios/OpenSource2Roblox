name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test app
        run: bun test

      - name: Build app
        run: bun run build

      - name: Build converter
        run: bun run converter:build
