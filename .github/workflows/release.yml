name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build converter
        run: bun run converter:build

      - name: Package app
        run: bun run package

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $package.version
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

          if (git tag --list $tag) {
            "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

          $changelog = Get-Content CHANGELOG.md -Raw
          $escaped = [Regex]::Escape($version)
          $match = [Regex]::Match($changelog, "(?s)## \[$escaped\].*?(?=^## \[|\z)", "Multiline")
          if ($match.Success) {
            $notes = $match.Value.Trim()
          } else {
            $notes = "Source2Roblox Studio $tag"
          }

          New-Item -ItemType Directory -Force release | Out-Null
          Set-Content -Path release-notes.md -Value $notes

      - name: Create release
        if: steps.meta.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $tag = "${{ steps.meta.outputs.tag }}"
          gh release create $tag `
            "release/Source2Roblox Studio Setup $version.exe" `
            "release/Source2Roblox Studio Setup $version.exe.blockmap" `
            --title "Source2Roblox Studio $tag" `
            --notes-file release-notes.md
