name: Bug report
description: Report a problem with Source2Roblox Studio.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Choose ...
        3. Press ...
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the relevant run log lines or attach screenshots.
